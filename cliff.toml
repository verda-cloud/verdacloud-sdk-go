# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

[changelog]
# Header text at the top of the changelog
header = """
# Changelog

All notable changes to this project will be documented in this file.

This changelog is automatically generated by [git-cliff](https://git-cliff.org/).
"""
body = """
{%- if version %}
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{%- else %}
## [Unreleased]
{%- endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits -%}
- ({{ commit.id | truncate(length=7, end="") }}) {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }} - {{ commit.author.name }} <{{ commit.author.email }}>
{% endfor %}
{%- endfor %}
"""
footer = """
<!-- Generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
require_conventional = false
split_commits = false
commit_preprocessors = [
    # Strip everything after the first line (removes PR body from merge commits)
    { pattern = "\n.*", replace = "" },
    # Remove trailing PR numbers like (#123)
    { pattern = "\\s*\\(#\\d+\\)", replace = "" },
]
protect_breaking_commits = false
filter_commits = false
topo_order = false
sort_commits = "oldest"
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Added" },
    { message = "^fix", group = "<!-- 1 -->Fixed" },
    { message = "^refactor", group = "<!-- 2 -->Changed" },
    { message = "^perf", group = "<!-- 3 -->Performance" },
    { message = "^doc", group = "<!-- 4 -->Documentation" },
    { message = "^test", group = "<!-- 5 -->Testing" },
    { message = "^ci", group = "<!-- 6 -->CI" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore", group = "<!-- 7 -->Other" },
    { message = "^revert", group = "<!-- 8 -->Reverted" },
    { message = ".*", group = "<!-- 9 -->Other" },
]
