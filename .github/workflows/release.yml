name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.4.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must match vX.Y.Z (e.g. v1.4.0)"
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run make release
        run: make release VERSION=${{ github.event.inputs.version }}

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): ${{ github.event.inputs.version }}"
          git tag ${{ github.event.inputs.version }}
          git push origin main --tags

      - name: Extract changelog for release
        id: changelog
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # Extract the section between this version and the next version header
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md | sed '/^$/N;/^\n$/d')
          # Write to file for the release body (avoids delimiter issues)
          echo "$NOTES" > /tmp/release-notes.md
          echo "Release notes extracted for $VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.event.inputs.version }} \
            --title "${{ github.event.inputs.version }}" \
            --notes-file /tmp/release-notes.md
